name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --all-features

      - name: Test CLI help
        run: cargo run -- --help

      - name: Test config default command
        run: cargo run -- config default

  # Optional: Run integration tests with Docker
  integration:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Test validate command
        run: |
          # Create a minimal checksums.yaml for testing
          mkdir -p /tmp/test-repo
          cat > /tmp/test-repo/checksums.yaml << 'EOF'
          version: "1.0"
          test_tool:
            version: "1.0.0"
            url: "https://example.com/install.sh"
            enabled: true
          EOF
          ./target/release/automated_flywheel_setup_checker validate --path /tmp/test-repo/checksums.yaml
