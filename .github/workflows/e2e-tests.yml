name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/e2e/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/e2e/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  rust-e2e:
    name: Rust E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-features

      - name: Run Rust E2E tests
        run: cargo test --test e2e --all-features -- --test-threads=1

      - name: Run Docker integration tests
        run: cargo test --test e2e --all-features -- --ignored --test-threads=1
        env:
          DOCKER_TESTS: "1"
        continue-on-error: true

  bash-e2e:
    name: Bash E2E Tests
    runs-on: ubuntu-latest
    needs: rust-e2e
    timeout-minutes: 45

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build release binary
        run: cargo build --release

      - name: Run E2E test suite
        run: |
          chmod +x scripts/e2e/run_all_tests.sh
          ./scripts/e2e/run_all_tests.sh
        env:
          E2E_VERBOSE: "1"
          E2E_TIMEOUT: "600"
          E2E_SKIP_PREFLIGHT: "0"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: target/e2e-logs/
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: target/e2e-reports/
          retention-days: 30

  e2e-summary:
    name: E2E Summary
    runs-on: ubuntu-latest
    needs: [rust-e2e, bash-e2e]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Check E2E results
        run: |
          if [[ "${{ needs.rust-e2e.result }}" == "failure" ]]; then
            echo "::error::Rust E2E tests failed"
            exit 1
          fi
          if [[ "${{ needs.bash-e2e.result }}" == "failure" ]]; then
            echo "::error::Bash E2E tests failed"
            exit 1
          fi
          echo "All E2E tests passed!"
